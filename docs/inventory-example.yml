---
servers:
  hosts:
    host.example.org:
  vars:
    iac_blueprint:
      podman:
        configuration:
          network:
            default_subnet: 10.168.0.0/24
            default_gateway: 10.168.0.1
        containers:
          - preset: rhel9
            parameters:
              name: "test-1"
              hostname: "test-1"
              ip: 10.168.0.100
              publish: 8080:80
          - preset: rhel9
            parameters:
              name: "test-systemd"
              systemd: always
              privileged: true
              volume:
                - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
            bootstrap_packages:
              - openssh-server
            bootstrap_services:
              - sshd
            bootstrap_ssh_root_access: true
          - image: "docker.io/metabase/metabase"
            parameters:
              name: "testi-2"
              ip: 10.168.0.101
