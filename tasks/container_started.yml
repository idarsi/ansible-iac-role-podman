---
###############################################################################
#
# container_started.yml
#
# @author Arsi Atomi
#
###############################################################################

###############################################################################
# SETTING VARIABLES
###############################################################################

- name: "Checking if required variables are defined"
  ansible.builtin.assert:
    that:
      - podman_container_record is defined
    fail_msg: "All tests did not pass"

- name: "Resolving optional container preset"
  ansible.builtin.set_fact:
    podman_container_effective: >-
      {{
        (
          podman_container_presets[podman_container_record.preset]
          if (podman_container_record.preset is defined and podman_container_record.preset is not none)
          else {}
        ) | combine(podman_container_record, recursive=True)
      }}

- name: "Checking that container name is available"
  ansible.builtin.assert:
    that:
      - podman_container_effective.parameters is defined
      - podman_container_effective.parameters.name is defined
      - (podman_container_effective.parameters.name | string | trim) != ""
    fail_msg: "Podman container must define parameters.name directly or through preset data"

###############################################################################
# ENSURING CONTAINER IS STARTED
###############################################################################

- name: "Checking container status"
  ansible.builtin.command: podman inspect --format '{{ "{{ .State.Status }}" }}' {{ podman_container_effective.parameters.name }}
  register: container_active
  changed_when: false
  failed_when: false

- name: "Ensuring container is started"
  ansible.builtin.shell: >
    podman start {{ podman_container_effective.parameters.name }}
  changed_when: true
  when: container_active.stdout != "running"

- name: "Detecting package manager inside container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "if command -v dnf >/dev/null 2>&1; then echo dnf;
    elif command -v microdnf >/dev/null 2>&1; then echo microdnf;
    elif command -v yum >/dev/null 2>&1; then echo yum;
    else exit 1; fi"
  register: podman_container_package_manager
  changed_when: false
  when:
    - podman_container_effective.bootstrap_packages is defined
    - podman_container_effective.bootstrap_packages | length > 0

- name: "Checking bootstrap package manager support"
  ansible.builtin.assert:
    that:
      - podman_container_package_manager.rc == 0
      - (podman_container_package_manager.stdout | string | trim) != ""
    fail_msg: >-
      bootstrap_packages is experimental and requires a supported package
      manager (dnf, microdnf, yum) inside container
      {{ podman_container_effective.parameters.name }}
  when:
    - podman_container_effective.bootstrap_packages is defined
    - podman_container_effective.bootstrap_packages | length > 0

- name: "Installing experimental bootstrap packages inside container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "{{ podman_container_package_manager.stdout | trim }} install -y
    {% for package_name in podman_container_effective.bootstrap_packages %}
    {{ package_name }}
    {% endfor %}"
  register: podman_bootstrap_install_result
  changed_when: >-
    (
      'Nothing to do.' not in (podman_bootstrap_install_result.stdout | default(''))
      and 'Nothing to do.' not in (podman_bootstrap_install_result.stderr | default(''))
      and 'already installed' not in (podman_bootstrap_install_result.stdout | default(''))
      and 'already installed' not in (podman_bootstrap_install_result.stderr | default(''))
    )
  when:
    - podman_container_effective.bootstrap_packages is defined
    - podman_container_effective.bootstrap_packages | length > 0

- name: "Checking systemctl support inside container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "command -v systemctl >/dev/null 2>&1 && systemctl is-system-running >/dev/null 2>&1 || systemctl list-unit-files >/dev/null 2>&1"
  register: podman_container_systemctl_support
  changed_when: false
  failed_when: false
  when:
    - podman_container_effective.bootstrap_services is defined
    - podman_container_effective.bootstrap_services | length > 0

- name: "Checking bootstrap service manager support"
  ansible.builtin.assert:
    that:
      - podman_container_systemctl_support.rc == 0
    fail_msg: >-
      bootstrap_services is experimental and requires a working systemctl
      inside container {{ podman_container_effective.parameters.name }}
  when:
    - podman_container_effective.bootstrap_services is defined
    - podman_container_effective.bootstrap_services | length > 0

- name: "Enabling experimental bootstrap services inside container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "systemctl enable --now {{ item }}"
  loop: "{{ podman_container_effective.bootstrap_services }}"
  register: podman_bootstrap_services_result
  changed_when: >-
    'Created symlink' in (podman_bootstrap_services_result.stdout | default(''))
    or 'Created symlink' in (podman_bootstrap_services_result.stderr | default(''))
    or 'Started' in (podman_bootstrap_services_result.stdout | default(''))
    or 'Started' in (podman_bootstrap_services_result.stderr | default(''))
  when:
    - podman_container_effective.bootstrap_services is defined
    - podman_container_effective.bootstrap_services | length > 0

- name: "Preparing experimental root SSH access key paths"
  ansible.builtin.set_fact:
    podman_container_ssh_private_key_path: >-
      {{
        podman_container_effective.bootstrap_ssh_private_key_path
        | default(
            podman_container_generated_ssh_key_dir
            ~ '/id_ed25519_podman_'
            ~ (
              podman_container_effective.parameters.name
              | regex_replace('[^A-Za-z0-9._-]', '_')
            )
          )
      }}
    podman_container_ssh_public_key_path: >-
      {{
        (
          podman_container_effective.bootstrap_ssh_private_key_path
          | default(
              podman_container_generated_ssh_key_dir
              ~ '/id_ed25519_podman_'
              ~ (
                podman_container_effective.parameters.name
                | regex_replace('[^A-Za-z0-9._-]', '_')
              )
            )
        ) ~ '.pub'
      }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Ensuring host SSH directory exists for generated container keys"
  ansible.builtin.file:
    path: "{{ podman_container_ssh_private_key_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Checking generated container SSH private key"
  ansible.builtin.stat:
    path: "{{ podman_container_ssh_private_key_path }}"
  register: podman_container_ssh_private_key_stat
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Generating experimental root SSH key pair for container access"
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -q -t ed25519 -N '' -C
      podman-root@{{ podman_container_effective.parameters.name }}
      -f {{ podman_container_ssh_private_key_path }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - not podman_container_ssh_private_key_stat.stat.exists

- name: "Checking generated container SSH public key"
  ansible.builtin.stat:
    path: "{{ podman_container_ssh_public_key_path }}"
  register: podman_container_ssh_public_key_stat
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Deriving missing SSH public key from private key"
  ansible.builtin.shell: >
    ssh-keygen -y -f {{ podman_container_ssh_private_key_path }} >
    {{ podman_container_ssh_public_key_path }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - not podman_container_ssh_public_key_stat.stat.exists

- name: "Reading generated container SSH public key"
  ansible.builtin.slurp:
    path: "{{ podman_container_ssh_public_key_path }}"
  register: podman_container_ssh_public_key_content
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Checking whether generated SSH public key is already installed in container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "mkdir -p /root/.ssh &&
    chmod 700 /root/.ssh &&
    touch /root/.ssh/authorized_keys &&
    chmod 600 /root/.ssh/authorized_keys &&
    key_line='{{ podman_container_ssh_public_key_content.content | b64decode | trim }}' &&
    if grep -qxF \"\$key_line\" /root/.ssh/authorized_keys 2>/dev/null; then
      echo PRESENT;
    else
      echo MISSING;
    fi"
  register: podman_container_authorized_key_presence
  changed_when: false
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Creating temporary authorized key file on host"
  ansible.builtin.tempfile:
    state: file
    suffix: ".pub"
  register: podman_container_authorized_key_tempfile
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - podman_container_authorized_key_presence.stdout != "PRESENT"

- name: "Writing generated SSH public key to temporary host file"
  ansible.builtin.copy:
    dest: "{{ podman_container_authorized_key_tempfile.path }}"
    content: "{{ podman_container_ssh_public_key_content.content | b64decode }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - podman_container_authorized_key_presence.stdout != "PRESENT"

- name: "Ensuring container root SSH directory exists"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "mkdir -p /root/.ssh && chmod 700 /root/.ssh"
  changed_when: false
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Copying generated SSH public key into container"
  ansible.builtin.command:
    cmd: >-
      podman cp {{ podman_container_authorized_key_tempfile.path }}
      {{ podman_container_effective.parameters.name }}:/tmp/idarsi-root-authorized-key.pub
  changed_when: false
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - podman_container_authorized_key_presence.stdout != "PRESENT"

- name: "Installing generated SSH public key into container root authorized_keys"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "touch /root/.ssh/authorized_keys &&
    chmod 600 /root/.ssh/authorized_keys &&
    key_line=\$(cat /tmp/idarsi-root-authorized-key.pub) &&
    if grep -qxF \"\$key_line\" /root/.ssh/authorized_keys 2>/dev/null; then
      echo UNCHANGED;
    else
      printf '%s\n' \"\$key_line\" >> /root/.ssh/authorized_keys &&
      echo CHANGED;
    fi &&
    rm -f /tmp/idarsi-root-authorized-key.pub"
  register: podman_container_authorized_keys_result
  changed_when: "'CHANGED' in (podman_container_authorized_keys_result.stdout | default(''))"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - podman_container_authorized_key_presence.stdout != "PRESENT"

- name: "Removing temporary authorized key file from host"
  ansible.builtin.file:
    path: "{{ podman_container_authorized_key_tempfile.path }}"
    state: absent
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - podman_container_authorized_key_presence.stdout != "PRESENT"
