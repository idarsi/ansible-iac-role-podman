---
###############################################################################
#
# container_started.yml
#
# @author Arsi Atomi
#
###############################################################################

###############################################################################
# SETTING VARIABLES
###############################################################################

- name: "Checking if required variables are defined"
  ansible.builtin.assert:
    that:
      - podman_container_record is defined
    fail_msg: "All tests did not pass"

- name: "Resolving optional container preset"
  ansible.builtin.set_fact:
    podman_container_effective: >-
      {{
        (
          podman_container_presets[podman_container_record.preset]
          if (podman_container_record.preset is defined and podman_container_record.preset is not none)
          else {}
        ) | combine(podman_container_record, recursive=True)
      }}

- name: "Checking that container name is available"
  ansible.builtin.assert:
    that:
      - podman_container_effective.parameters is defined
      - podman_container_effective.parameters.name is defined
      - (podman_container_effective.parameters.name | string | trim) != ""
    fail_msg: "Podman container must define parameters.name directly or through preset data"

###############################################################################
# ENSURING CONTAINER IS STARTED
###############################################################################

- name: "Checking container status"
  ansible.builtin.command: podman inspect --format '{{ "{{ .State.Status }}" }}' {{ podman_container_effective.parameters.name }}
  register: container_active
  changed_when: false
  failed_when: false

- name: "Ensuring container is started"
  ansible.builtin.shell: >
    podman start {{ podman_container_effective.parameters.name }}
  changed_when: true
  when: container_active.stdout != "running"

- name: "Detecting package manager inside container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "if command -v dnf >/dev/null 2>&1; then echo dnf;
    elif command -v microdnf >/dev/null 2>&1; then echo microdnf;
    elif command -v yum >/dev/null 2>&1; then echo yum;
    else exit 1; fi"
  register: podman_container_package_manager
  changed_when: false
  when:
    - podman_container_effective.bootstrap_packages is defined
    - podman_container_effective.bootstrap_packages | length > 0

- name: "Checking bootstrap package manager support"
  ansible.builtin.assert:
    that:
      - podman_container_package_manager.rc == 0
      - (podman_container_package_manager.stdout | string | trim) != ""
    fail_msg: >-
      bootstrap_packages is experimental and requires a supported package
      manager (dnf, microdnf, yum) inside container
      {{ podman_container_effective.parameters.name }}
  when:
    - podman_container_effective.bootstrap_packages is defined
    - podman_container_effective.bootstrap_packages | length > 0

- name: "Installing experimental bootstrap packages inside container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "{{ podman_container_package_manager.stdout | trim }} install -y
    {% for package_name in podman_container_effective.bootstrap_packages %}
    {{ package_name }}
    {% endfor %}"
  register: podman_bootstrap_install_result
  changed_when: >-
    (
      'Nothing to do.' not in (podman_bootstrap_install_result.stdout | default(''))
      and 'Nothing to do.' not in (podman_bootstrap_install_result.stderr | default(''))
      and 'already installed' not in (podman_bootstrap_install_result.stdout | default(''))
      and 'already installed' not in (podman_bootstrap_install_result.stderr | default(''))
    )
  when:
    - podman_container_effective.bootstrap_packages is defined
    - podman_container_effective.bootstrap_packages | length > 0

- name: "Checking systemctl support inside container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "command -v systemctl >/dev/null 2>&1 && systemctl is-system-running >/dev/null 2>&1 || systemctl list-unit-files >/dev/null 2>&1"
  register: podman_container_systemctl_support
  changed_when: false
  failed_when: false
  when:
    - podman_container_effective.bootstrap_services is defined
    - podman_container_effective.bootstrap_services | length > 0

- name: "Checking bootstrap service manager support"
  ansible.builtin.assert:
    that:
      - podman_container_systemctl_support.rc == 0
    fail_msg: >-
      bootstrap_services is experimental and requires a working systemctl
      inside container {{ podman_container_effective.parameters.name }}
  when:
    - podman_container_effective.bootstrap_services is defined
    - podman_container_effective.bootstrap_services | length > 0

- name: "Enabling experimental bootstrap services inside container"
  ansible.builtin.shell: >
    podman exec {{ podman_container_effective.parameters.name }} sh -lc
    "systemctl enable --now {{ item }}"
  loop: "{{ podman_container_effective.bootstrap_services }}"
  register: podman_bootstrap_services_result
  changed_when: >-
    'Created symlink' in (podman_bootstrap_services_result.stdout | default(''))
    or 'Created symlink' in (podman_bootstrap_services_result.stderr | default(''))
    or 'Started' in (podman_bootstrap_services_result.stdout | default(''))
    or 'Started' in (podman_bootstrap_services_result.stderr | default(''))
  when:
    - podman_container_effective.bootstrap_services is defined
    - podman_container_effective.bootstrap_services | length > 0

- name: "Normalizing experimental root SSH authorized key inputs"
  ansible.builtin.set_fact:
    podman_container_controller_ssh_authorized_keys_contents: >-
      {{
        podman_container_controller_ssh_authorized_keys_contents_raw
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | list
      }}
    podman_container_controller_ssh_authorized_keys_files: >-
      {{
        podman_container_controller_ssh_authorized_keys_files_raw
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | list
      }}
    podman_container_manage_root_ssh_authorized_keys: >-
      {{
        (podman_container_effective.bootstrap_ssh_root_access | default(false))
        or (podman_container_controller_ssh_authorized_keys_contents_raw | length > 0)
        or (podman_container_controller_ssh_authorized_keys_files_raw | length > 0)
      }}
  vars:
    podman_container_controller_ssh_authorized_keys_contents_raw: >-
      {{
        [podman_container_effective.bootstrap_ssh_authorized_keys_contents]
        if (
          podman_container_effective.bootstrap_ssh_authorized_keys_contents is defined
          and podman_container_effective.bootstrap_ssh_authorized_keys_contents is string
        )
        else (
          podman_container_effective.bootstrap_ssh_authorized_keys_contents
          if (
            podman_container_effective.bootstrap_ssh_authorized_keys_contents is defined
          )
          else []
        )
      }}
    podman_container_controller_ssh_authorized_keys_files_raw: >-
      {{
        [podman_container_effective.bootstrap_ssh_authorized_keys_files]
        if (
          podman_container_effective.bootstrap_ssh_authorized_keys_files is defined
          and podman_container_effective.bootstrap_ssh_authorized_keys_files is string
        )
        else (
          podman_container_effective.bootstrap_ssh_authorized_keys_files
          if (
            podman_container_effective.bootstrap_ssh_authorized_keys_files is defined
          )
          else []
        )
      }}

- name: "Preparing experimental root SSH access key paths"
  ansible.builtin.set_fact:
    podman_container_ssh_host_user: >-
      {{
        podman_container_ssh_host_user_override
        | default(None, true)
        | default(
        ansible_user
        | default(ansible_ssh_user, true)
        | default(ansible_env.SUDO_USER, true)
        | default(ansible_user_id),
        true
        )
      }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Reading host SSH bootstrap user account entry"
  ansible.builtin.command:
    cmd: "getent passwd {{ podman_container_ssh_host_user }}"
  register: podman_container_ssh_host_user_passwd
  changed_when: false
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Reading host SSH bootstrap user primary group"
  ansible.builtin.command:
    cmd: "id -gn {{ podman_container_ssh_host_user }}"
  register: podman_container_ssh_host_user_group
  changed_when: false
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Resolving experimental root SSH access host paths"
  ansible.builtin.set_fact:
    podman_container_ssh_host_home: >-
      {{
        (podman_container_ssh_host_user_passwd.stdout.split(':'))[5]
      }}
    podman_container_ssh_host_group: >-
      {{
        podman_container_ssh_host_user_group.stdout | trim
      }}
    podman_container_ssh_dir: >-
      {{
        (
          (
            podman_container_effective.bootstrap_ssh_private_key_path
            | dirname
          )
          if (
            podman_container_effective.bootstrap_ssh_private_key_path is defined
            and (podman_container_effective.bootstrap_ssh_private_key_path | string | trim) != ''
          )
          else
          (
            (
              (podman_container_ssh_host_user_passwd.stdout.split(':'))[5]
            ) ~ '/.ssh'
          )
        )
      }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Checking resolved host SSH bootstrap paths"
  ansible.builtin.assert:
    that:
      - (podman_container_ssh_host_home | string | trim) != ""
      - (podman_container_ssh_host_group | string | trim) != ""
      - (podman_container_ssh_dir | string | trim) != ""
    fail_msg: "Could not resolve host SSH bootstrap user paths"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Preparing experimental root SSH access key paths"
  ansible.builtin.set_fact:
    podman_container_ssh_private_key_path: >-
      {{
        podman_container_effective.bootstrap_ssh_private_key_path
        | default(
            podman_container_ssh_dir
            ~ '/id_ed25519_podman_'
            ~ (
              podman_container_effective.parameters.name
              | regex_replace('[^A-Za-z0-9._-]', '_')
            )
          )
      }}
    podman_container_ssh_public_key_path: >-
      {{
        (
          podman_container_effective.bootstrap_ssh_private_key_path
          | default(
              podman_container_ssh_dir
              ~ '/id_ed25519_podman_'
              ~ (
                podman_container_effective.parameters.name
                | regex_replace('[^A-Za-z0-9._-]', '_')
              )
            )
        ) ~ '.pub'
      }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Preparing experimental root SSH access known_hosts path"
  ansible.builtin.set_fact:
    podman_container_ssh_known_hosts_path: >-
      {{
        podman_container_effective.bootstrap_ssh_known_hosts_path
        | default((podman_container_ssh_private_key_path | dirname) ~ '/known_hosts')
      }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Ensuring host SSH directory exists for generated container keys"
  ansible.builtin.file:
    path: "{{ podman_container_ssh_private_key_path | dirname }}"
    state: directory
    owner: "{{ podman_container_ssh_host_user }}"
    group: "{{ podman_container_ssh_host_group }}"
    mode: "0700"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Ensuring SSH client tools are installed for host key scanning"
  ansible.builtin.include_tasks: package_present.yml
  vars:
    iac_package: "openssh-clients"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Detecting container IP address for SSH access"
  ansible.builtin.command: >-
    podman inspect --format
    '{{ "{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}" }}'
    {{ podman_container_effective.parameters.name }}
  register: podman_container_ssh_container_ips
  changed_when: false
  retries: 10
  delay: 2
  until: >-
    (
      (
        (
          [podman_container_effective.parameters.publish]
          if (
            podman_container_effective.parameters is defined
            and podman_container_effective.parameters.publish is defined
            and podman_container_effective.parameters.publish is string
          )
          else (
            podman_container_effective.parameters.publish
            if (
              podman_container_effective.parameters is defined
              and podman_container_effective.parameters.publish is defined
            )
            else []
          )
        )
        | map('string')
        | map('trim')
        | select('search', '(^|:)22$')
        | list
        | length
      ) > 0
    )
    or
    (
      (
        podman_container_ssh_container_ips.stdout_lines | default([])
      )
      | map('trim')
      | reject('equalto', '')
      | list
      | length
    ) > 0
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Building SSH known_hosts scan target list"
  ansible.builtin.set_fact:
    podman_container_ssh_scan_targets: >-
      {%- set targets = [] -%}
      {%- set publish_values = podman_container_effective.parameters.publish
            if (
              podman_container_effective.parameters is defined
              and podman_container_effective.parameters.publish is defined
            )
            else [] -%}
      {%- if publish_values is string -%}
      {%- set publish_values = [publish_values] -%}
      {%- endif -%}
      {%- for publish_value in publish_values -%}
      {%- set publish_parts = (publish_value | string | trim).split(':') -%}
      {%- if publish_parts | length == 2 and publish_parts[1] == '22' -%}
      {%- set target_host = '127.0.0.1' -%}
      {%- set host_port = publish_parts[0] | trim -%}
      {%- set _ = targets.append({
            'scan_host': target_host,
            'scan_port': host_port,
            'known_host_name': '[' ~ target_host ~ ']:' ~ host_port
          }) -%}
      {%- elif publish_parts | length == 3 and publish_parts[2] == '22' -%}
      {%- set host_ip = publish_parts[0] | trim -%}
      {%- set target_host = '127.0.0.1' if host_ip in ['', '0.0.0.0', '::', ':::'] else host_ip -%}
      {%- set host_port = publish_parts[1] | trim -%}
      {%- set _ = targets.append({
            'scan_host': target_host,
            'scan_port': host_port,
            'known_host_name': '[' ~ target_host ~ ']:' ~ host_port
          }) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- for ip_addr in (podman_container_ssh_container_ips.stdout_lines | default([])) -%}
      {%- if (ip_addr | string | trim) != '' -%}
      {%- set trimmed_ip = ip_addr | trim -%}
      {%- set _ = targets.append({
            'scan_host': trimmed_ip,
            'scan_port': '22',
            'known_host_name': trimmed_ip
          }) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ targets | unique }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Checking that container SSH access targets were discovered"
  ansible.builtin.assert:
    that:
      - (podman_container_ssh_scan_targets | default([])) | length > 0
    fail_msg: >-
      bootstrap_ssh_root_access could not discover any SSH access targets for
      container {{ podman_container_effective.parameters.name }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Debugging container SSH access target discovery"
  ansible.builtin.debug:
    msg:
      container_name: "{{ podman_container_effective.parameters.name }}"
      publish: "{{ podman_container_effective.parameters.publish | default([]) }}"
      detected_ips: "{{ podman_container_ssh_container_ips.stdout_lines | default([]) }}"
      scan_targets: "{{ podman_container_ssh_scan_targets | default([]) }}"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - podman_debug_bootstrap_ssh | default(false)

- name: "Checking SSH scan target availability"
  ansible.builtin.wait_for:
    host: "{{ item.scan_host }}"
    port: "{{ item.scan_port | int }}"
    state: started
    timeout: 10
  loop: "{{ podman_container_ssh_scan_targets | default([]) }}"
  loop_control:
    label: "{{ item.known_host_name }}"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_scan_targets | default([])) | length > 0

- name: "Reading container SSH ED25519 host public key"
  ansible.builtin.command: >-
    podman exec {{ podman_container_effective.parameters.name }}
    sh -lc 'cat /etc/ssh/ssh_host_ed25519_key.pub'
  register: podman_container_ssh_host_public_key
  changed_when: false
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_scan_targets | default([])) | length > 0

- name: "Building normalized known_hosts entries for container SSH host keys"
  ansible.builtin.set_fact:
    podman_container_ssh_known_host_entries: >-
      {%- set entries = [] -%}
      {%- set host_key_parts = (podman_container_ssh_host_public_key.stdout | default('') | trim).split() -%}
      {%- if
            (host_key_parts | length) >= 2
            and (host_key_parts[0] == 'ssh-ed25519')
         -%}
      {%- for target in (podman_container_ssh_scan_targets | default([])) -%}
      {%- set normalized_line =
            (
              target.known_host_name ~ ' '
              ~ host_key_parts[0] ~ ' '
              ~ host_key_parts[1]
            ) | trim -%}
      {%- if normalized_line != '' -%}
      {%- set _ = entries.append({
            'name': target.known_host_name,
            'key': normalized_line
          }) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- endif -%}
      {{ entries | unique | sort(attribute='name') }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_scan_targets | default([])) | length > 0

- name: "Checking existing root known_hosts before managed update"
  ansible.builtin.stat:
    path: "{{ podman_container_ssh_known_hosts_path }}"
  register: podman_container_existing_known_hosts_stat
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_known_host_entries | default([])) | length > 0

- name: "Reading existing root known_hosts before managed update"
  ansible.builtin.slurp:
    path: "{{ podman_container_ssh_known_hosts_path }}"
  register: podman_container_existing_known_hosts
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_known_host_entries | default([])) | length > 0
    - podman_container_existing_known_hosts_stat.stat.exists

- name: "Rendering managed root known_hosts content for container SSH host keys"
  ansible.builtin.set_fact:
    podman_container_rendered_known_hosts_content: |-
      {%- set marker_begin = '# BEGIN ANSIBLE-IAC-ROLE-PODMAN SSH HOST KEYS' -%}
      {%- set marker_end = '# END ANSIBLE-IAC-ROLE-PODMAN SSH HOST KEYS' -%}
      {%- set existing_content = (podman_container_existing_known_hosts.content | default('') | b64decode) -%}
      {%- set stripped_content = existing_content | regex_replace('(?ms)^# BEGIN ANSIBLE-IAC-ROLE-PODMAN SSH HOST KEYS\\n.*?^# END ANSIBLE-IAC-ROLE-PODMAN SSH HOST KEYS\\n?', '') -%}
      {%- set cleaned_content = stripped_content.rstrip('\n') -%}
      {%- if cleaned_content != '' -%}
      {{ cleaned_content }}

      {%- endif -%}
      {{ marker_begin }}
      {% for item in (podman_container_ssh_known_host_entries | default([])) %}
      {{ item.key }}
      {% endfor %}
      {{ marker_end }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_known_host_entries | default([])) | length > 0

- name: "Debugging bootstrap SSH known_hosts management"
  ansible.builtin.include_tasks: bootstrap_ssh_debug.yml
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_known_host_entries | default([])) | length > 0
    - podman_debug_bootstrap_ssh | default(false)

- name: "Ensuring root known_hosts contains scanned container SSH host keys"
  ansible.builtin.copy:
    dest: "{{ podman_container_ssh_known_hosts_path }}"
    content: "{{ podman_container_rendered_known_hosts_content ~ '\n' }}"
    owner: "{{ podman_container_ssh_host_user }}"
    group: "{{ podman_container_ssh_host_group }}"
    mode: "0600"
  register: podman_container_known_hosts_write_result
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_known_host_entries | default([])) | length > 0

- name: "Reading root known_hosts after managed update"
  ansible.builtin.slurp:
    path: "{{ podman_container_ssh_known_hosts_path }}"
  register: podman_container_known_hosts_after_update
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - (podman_container_ssh_known_host_entries | default([])) | length > 0
    - podman_debug_bootstrap_ssh | default(false)

- name: "Checking generated container SSH private key"
  ansible.builtin.stat:
    path: "{{ podman_container_ssh_private_key_path }}"
  register: podman_container_ssh_private_key_stat
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Generating experimental root SSH key pair for container access"
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -q -t ed25519 -N '' -C
      podman-root@{{ podman_container_effective.parameters.name }}
      -f {{ podman_container_ssh_private_key_path }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - not podman_container_ssh_private_key_stat.stat.exists

- name: "Re-checking generated container SSH private key"
  ansible.builtin.stat:
    path: "{{ podman_container_ssh_private_key_path }}"
  register: podman_container_ssh_private_key_stat_after_generation
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Ensuring generated container SSH private key ownership and mode"
  ansible.builtin.file:
    path: "{{ podman_container_ssh_private_key_path }}"
    owner: "{{ podman_container_ssh_host_user }}"
    group: "{{ podman_container_ssh_host_group }}"
    mode: "0600"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - podman_container_ssh_private_key_stat_after_generation.stat.exists

- name: "Checking generated container SSH public key"
  ansible.builtin.stat:
    path: "{{ podman_container_ssh_public_key_path }}"
  register: podman_container_ssh_public_key_stat
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Deriving missing SSH public key from private key"
  ansible.builtin.shell: >
    ssh-keygen -y -f {{ podman_container_ssh_private_key_path }} >
    {{ podman_container_ssh_public_key_path }}
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - not podman_container_ssh_public_key_stat.stat.exists

- name: "Re-checking generated container SSH public key"
  ansible.builtin.stat:
    path: "{{ podman_container_ssh_public_key_path }}"
  register: podman_container_ssh_public_key_stat_after_generation
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Ensuring generated container SSH public key ownership and mode"
  ansible.builtin.file:
    path: "{{ podman_container_ssh_public_key_path }}"
    owner: "{{ podman_container_ssh_host_user }}"
    group: "{{ podman_container_ssh_host_group }}"
    mode: "0644"
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)
    - podman_container_ssh_public_key_stat_after_generation.stat.exists

- name: "Reading generated container SSH public key"
  ansible.builtin.slurp:
    path: "{{ podman_container_ssh_public_key_path }}"
  register: podman_container_ssh_public_key_content
  when:
    - podman_container_effective.bootstrap_ssh_root_access | default(false)

- name: "Managing container root authorized_keys"
  ansible.builtin.include_tasks: bootstrap_root_authorized_keys.yml
  when:
    - podman_container_manage_root_ssh_authorized_keys | bool

- name: "Managing container root sshd login policy"
  ansible.builtin.include_tasks: bootstrap_root_sshd_policy.yml
  when:
    - podman_container_manage_root_ssh_authorized_keys | bool
