driver:
  name: podman

platforms:
  - name: instance-idarsi-rl10-experimental
    image: docker.io/idarsi/rockylinux-init:10
    command: /sbin/init
    privileged: true
    pre_build_image: true
    systemd: true
    tty: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  env:
    ANSIBLE_ASYNC_DIR: "${MOLECULE_PROJECT_DIRECTORY}/.ansible_async"
    ANSIBLE_LOCAL_TEMP: "/tmp/.ansible/tmp"
    ANSIBLE_REMOTE_TMP: "/tmp/.ansible/tmp"
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."

verifier:
  name: ansible
