---
- name: Verify
  hosts: all
  become: false
  vars:
    podman_experimental_container_name: "molecule-rhel9-experimental"
    podman_experimental_private_key_path: "/root/.ssh/id_ed25519_podman_molecule-rhel9-experimental"
    podman_experimental_public_key_path: "/root/.ssh/id_ed25519_podman_molecule-rhel9-experimental.pub"
    podman_experimental_known_hosts_path: "/root/.ssh/known_hosts"
  tasks:
    - name: "Checking experimental container status"
      ansible.builtin.command: >-
        podman inspect --format '{{ "{{ .State.Status }}" }}'
        {{ podman_experimental_container_name }}
      register: podman_experimental_container_status
      changed_when: false

    - name: "Checking openssh-server installation inside experimental container"
      ansible.builtin.command: >-
        podman exec {{ podman_experimental_container_name }}
        rpm -q openssh-server
      register: podman_experimental_openssh_package
      changed_when: false

    - name: "Checking sshd service enabled state inside experimental container"
      ansible.builtin.command: >-
        podman exec {{ podman_experimental_container_name }}
        systemctl is-enabled sshd
      register: podman_experimental_sshd_enabled
      changed_when: false

    - name: "Checking sshd service active state inside experimental container"
      ansible.builtin.command: >-
        podman exec {{ podman_experimental_container_name }}
        systemctl is-active sshd
      register: podman_experimental_sshd_active
      changed_when: false

    - name: "Checking generated SSH private key on host"
      ansible.builtin.stat:
        path: "{{ podman_experimental_private_key_path }}"
      register: podman_experimental_private_key_stat

    - name: "Checking generated SSH public key on host"
      ansible.builtin.stat:
        path: "{{ podman_experimental_public_key_path }}"
      register: podman_experimental_public_key_stat

    - name: "Reading generated SSH public key on host"
      ansible.builtin.slurp:
        path: "{{ podman_experimental_public_key_path }}"
      register: podman_experimental_public_key
      when: podman_experimental_public_key_stat.stat.exists

    - name: "Reading container authorized_keys"
      ansible.builtin.command: >-
        podman exec {{ podman_experimental_container_name }}
        sh -lc 'cat /root/.ssh/authorized_keys'
      register: podman_experimental_authorized_keys
      changed_when: false

    - name: "Checking generated known_hosts file on host"
      ansible.builtin.stat:
        path: "{{ podman_experimental_known_hosts_path }}"
      register: podman_experimental_known_hosts_stat

    - name: "Reading generated known_hosts file on host"
      ansible.builtin.slurp:
        path: "{{ podman_experimental_known_hosts_path }}"
      register: podman_experimental_known_hosts
      when: podman_experimental_known_hosts_stat.stat.exists

    - name: "Verifying experimental Podman state"
      ansible.builtin.assert:
        that:
          - podman_experimental_container_status.stdout == "running"
          - podman_experimental_openssh_package.rc == 0
          - podman_experimental_sshd_enabled.stdout in ["enabled", "enabled-runtime", "static"]
          - podman_experimental_sshd_active.stdout == "active"
          - podman_experimental_private_key_stat.stat.exists
          - podman_experimental_public_key_stat.stat.exists
          - podman_experimental_known_hosts_stat.stat.exists
          - (podman_experimental_public_key.content | b64decode | trim) in (podman_experimental_authorized_keys.stdout | default(''))
          - "'[127.0.0.1]:2222' in (podman_experimental_known_hosts.content | b64decode)"
        fail_msg: "Podman experimental Molecule verification failed"
